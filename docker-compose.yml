services:
  postgres:
    image: postgres:15
    container_name: edu-theme-postgres
    restart: always
    environment:
      POSTGRES_DB: edu_theme_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf
    networks:
      - edu-network
    command: postgres -c listen_addresses='*' -c log_statement=all

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edu-theme-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edu-theme.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - edu-network

volumes:
  postgres_data:


networks:
  edu-network:
    driver: bridge
