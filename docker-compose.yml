services:
  postgres:
    image: postgres:15-alpine
    container_name: edu-theme-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_theme_db
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edu-network

  prisma-studio:
    image: node:20-alpine
    container_name: edu-theme-prisma-studio
    restart: always
    working_dir: /app
    command: sh -c "npm install -g prisma@latest && prisma studio --hostname 0.0.0.0 --port 5556"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/edu_theme_db?schema=public"
    ports:
      - "5556:5556"
    volumes:
      - ./prisma:/app/prisma
      - ./node_modules/.prisma:/app/node_modules/.prisma
    depends_on:
      - postgres
    networks:
      - edu-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edu-theme-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edu-theme.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - edu-network

volumes:
  postgres_data:

networks:
  edu-network:
    driver: bridge
