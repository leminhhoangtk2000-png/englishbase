version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edu-theme-postgres
    restart: always
    environment:
      POSTGRES_USER: edu_user
      POSTGRES_PASSWORD: edu_password
      POSTGRES_DB: edu_theme_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edu-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edu-theme-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edu-theme.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - edu-network

volumes:
  postgres_data:


networks:
  edu-network:
    driver: bridge
